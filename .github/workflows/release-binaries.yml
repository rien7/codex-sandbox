name: release-binaries

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform_key: linux-x64
          - os: macos-14
            platform_key: darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache native Rust workspace
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            native/sandbox-host -> target
            native/vendor/codex-rs -> target
          shared-key: native-${{ runner.os }}-v1
          cache-workspace-crates: true

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native binaries
        run: pnpm run build:native

      - name: Sync packaged native assets
        run: pnpm run sync:native

      - name: Build adapter and CLI packages
        run: pnpm run build:packages

      - name: Package release archives
        run: node scripts/package-release-assets.mjs --platform-key "${{ matrix.platform_key }}"

      - name: Upload release archives
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform_key }}
          path: dist/release/*.tar.gz

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged archives
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist/release
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/*.tar.gz
