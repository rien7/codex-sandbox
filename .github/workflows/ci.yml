name: ci

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
          - os: macos-14
          - os: windows-2022

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache native Rust workspace
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            native/sandbox-host -> target
            native/vendor/codex-rs -> target
          shared-key: native-${{ runner.os }}-v1
          cache-workspace-crates: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript packages
        run: pnpm run build:packages

      - name: Run TypeScript checks
        run: pnpm run check

      - name: Run tests
        run: pnpm test

      - name: Verify native host compiles
        run: cargo check --manifest-path native/sandbox-host/Cargo.toml --bin sandbox-unified-exec-host

      - name: Verify execve wrapper compiles
        run: cargo check --manifest-path native/vendor/codex-rs/Cargo.toml -p codex-shell-escalation --bin codex-execve-wrapper
